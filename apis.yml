description: '15Five is a continuous performance management platform that enables
  organizations to manage employee check-ins, OKRs, 1-on-1 meetings, pulse surveys,
  and manager effectiveness data. The platform provides a REST API that allows IT
  admins and developers to read and modify 15Five account data via custom-built integrations.
  Authentication is handled via API keys using HTTP Basic Auth, and requests are rate-limited
  to 5 per second per IP address. The API supports reading user and organizational
  data, objectives, review cycles, and group management, and is available to customers
  on applicable subscription plans.

  '
